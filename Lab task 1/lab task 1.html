<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lab Task 1 - Product Info</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 
    <h1 style="text-align:center;">Lab Task 1 - Product Display</h1>
 
    <div class="product-container">
        
        <!-- Product 1 -->
        <div class="product-box">
            <img src="https://pngtree.com/so///laptop" alt="Laptop">
            <h2>Laptop</h2>
            <p>High performance laptop for work and gaming.</p>
            <p class="price">70000 BDT</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>
 
        <!-- Product 2 -->
        <div class="product-box">
            <img src="https://unsplash.com/s/photos/wireless-headphones" alt="Headphones">
            <h2>Headphones</h2>
            <p>Noise-cancelling wireless headphones.</p>
            <p class="price">2000BDT</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>
 
        <!-- Product 3 -->
        <div class="product-box">
            <img src="https://www.istockphoto.com/photos/smart-watch-on-white" alt="Smartwatch">
            <h2>Smartwatch</h2>
            <p>Stylish smartwatch with health tracking.</p>
            <p class="price">7000BDT</p>
            <a href="#" class="buy-btn">Buy Now</a>
        </div>
 
    </div>
 
</body>
</html>
